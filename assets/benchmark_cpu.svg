<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" role="img" aria-labelledby="title desc">
  <title id="title">Average CPU: Activity Monitor, MacJet v1 Python, MacJet v2 Rust</title>
  <desc id="desc">Bar chart: Activity Monitor about 1.2 percent, MacJet v2 Rust about 2.8 percent, MacJet v1 Python 14.7 percent average CPU of one core.</desc>
  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="360" y="36" text-anchor="middle" fill="#e6edf3" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="600">Average CPU % of one core (lower is better)</text>
  <text x="360" y="58" text-anchor="middle" fill="#8b949e" font-family="system-ui,Segoe UI,sans-serif" font-size="12">M4 Max, macOS 15.5 — benchmark_compare 2026-03-27; see docs/benchmarks.md</text>
  <!-- Y axis 0–16%; bar height = (value/16)*146; baseline y=236 -->
  <line x1="80" y1="90" x2="80" y2="236" stroke="#30363d" stroke-width="1"/>
  <text x="72" y="95" text-anchor="end" fill="#8b949e" font-size="11">16</text>
  <text x="72" y="166" text-anchor="end" fill="#8b949e" font-size="11">8</text>
  <text x="72" y="239" text-anchor="end" fill="#8b949e" font-size="11">0</text>
  <line x1="76" y1="90" x2="640" y2="90" stroke="#21262d" stroke-width="1"/>
  <line x1="76" y1="163" x2="640" y2="163" stroke="#21262d" stroke-width="1"/>
  <line x1="76" y1="236" x2="640" y2="236" stroke="#21262d" stroke-width="1"/>
  <!-- Activity Monitor 1.22% -->
  <rect x="118" y="224" width="100" height="12" rx="3" fill="#3fb950"/>
  <text x="168" y="318" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="500">Activity Monitor</text>
  <text x="168" y="214" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">1.2%</text>
  <!-- MacJet v1 Python 14.7% -->
  <rect x="310" y="102" width="100" height="134" rx="4" fill="#f85149"/>
  <text x="360" y="318" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="500">MacJet v1 (Python)</text>
  <text x="360" y="92" text-anchor="middle" fill="#f85149" font-size="13" font-weight="600">14.7%</text>
  <!-- MacJet v2 Rust 2.77% -->
  <rect x="502" y="211" width="100" height="25" rx="3" fill="#58a6ff"/>
  <text x="552" y="318" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="500">MacJet v2.0.1 (Rust)</text>
  <text x="552" y="201" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">2.8%</text>
  <text x="360" y="355" text-anchor="middle" fill="#8b949e" font-size="11">Averages: benchmark_compare session + historical v1 from docs/benchmarks.md</text>
</svg>
