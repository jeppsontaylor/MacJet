<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" role="img" aria-labelledby="title desc">
  <title id="title">MacJet CPU usage vs Activity Monitor and Python v1</title>
  <desc id="desc">Bar chart: Activity Monitor and MacJet v2 average about 0 percent CPU; MacJet v1 Python averages 14.7 percent.</desc>
  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="360" y="36" text-anchor="middle" fill="#e6edf3" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="600">Average CPU % (lower is better)</text>
  <text x="360" y="58" text-anchor="middle" fill="#8b949e" font-family="system-ui,Segoe UI,sans-serif" font-size="12">M4 Max, macOS 15.5  see docs/benchmarks.md</text>
  <!-- Y axis -->
  <line x1="80" y1="90" x2="80" y2="300" stroke="#30363d" stroke-width="1"/>
  <text x="72" y="95" text-anchor="end" fill="#8b949e" font-size="11">30</text>
  <text x="72" y="165" text-anchor="end" fill="#8b949e" font-size="11">15</text>
  <text x="72" y="235" text-anchor="end" fill="#8b949e" font-size="11">0</text>
  <line x1="76" y1="90" x2="640" y2="90" stroke="#21262d" stroke-width="1"/>
  <line x1="76" y1="165" x2="640" y2="165" stroke="#21262d" stroke-width="1"/>
  <line x1="76" y1="235" x2="640" y2="235" stroke="#21262d" stroke-width="1"/>
  <!-- Bars: scale 235 - y = (val/30) * 145 for val>0; 0% shown as thin pill -->
  <!-- Activity Monitor ~0% -->
  <rect x="118" y="228" width="100" height="8" rx="3" fill="#3fb950"/>
  <text x="168" y="318" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="500">Activity Monitor</text>
  <text x="168" y="218" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">H0%</text>
  <!-- MacJet v1 Python 14.7% -->
  <rect x="310" y="164" width="100" height="72" rx="4" fill="#f85149"/>
  <text x="360" y="318" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="500">MacJet v1 (Python)</text>
  <text x="360" y="152" text-anchor="middle" fill="#f85149" font-size="13" font-weight="600">14.7%</text>
  <!-- MacJet v2 0% -->
  <rect x="502" y="228" width="100" height="8" rx="3" fill="#58a6ff"/>
  <text x="552" y="318" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="500">MacJet v2.0.1 (Rust)</text>
  <text x="552" y="218" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">H0%</text>
  <text x="360" y="355" text-anchor="middle" fill="#8b949e" font-size="11">Rounded averages match published samples; full tables in docs/benchmarks.md</text>
</svg>
