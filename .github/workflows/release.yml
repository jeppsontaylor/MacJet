name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-mac:
    name: Build macOS universal binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Apple targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build aarch64 and x86_64
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary and archive
        run: |
          lipo -create -output macjet \
            target/aarch64-apple-darwin/release/macjet \
            target/x86_64-apple-darwin/release/macjet
          chmod +x macjet
          tar -czvf macjet-macos-universal.tar.gz macjet

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: macjet-macos-universal.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
