name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Check formatting (Black)
        run: black --check .

      - name: Lint (Ruff)
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=macjet --cov-report=term-missing

      - name: Import smoke test
        run: |
          python -c "from macjet.macjet_app import MacJetApp; print('TUI import OK')"
          python -c "from macjet_mcp import mcp; print('MCP import OK')"
          python -c "from macjet.collectors.metrics_history import MetricsHistory; print('MetricsHistory import OK')"
