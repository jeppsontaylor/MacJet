name: 🐛 Bug Report
description: Report a bug in JetMonitor
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below to help us investigate.

  - type: dropdown
    id: os-version
    attributes:
      label: macOS Version
      options:
        - macOS 15 Sequoia
        - macOS 14 Sonoma
        - macOS 13 Ventura
        - macOS 12 Monterey
        - Other
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: Chip
      options:
        - Apple M4 / M4 Pro / M4 Max / M4 Ultra
        - Apple M3 / M3 Pro / M3 Max / M3 Ultra
        - Apple M2 / M2 Pro / M2 Max / M2 Ultra
        - Apple M1 / M1 Pro / M1 Max / M1 Ultra
        - Intel
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python3 --version`"
      placeholder: "Python 3.12.0"
    validations:
      required: true

  - type: dropdown
    id: run-mode
    attributes:
      label: How are you running JetMonitor?
      options:
        - sudo ./jetmonitor.sh (full mode)
        - ./jetmonitor.sh (basic mode)
        - python -m jetmonitor
        - MCP server (--mcp)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I press '5' to switch to the Reclaim view..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      value: |
        1. Launch JetMonitor with `sudo ./jetmonitor.sh`
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots / Terminal Output
      description: If applicable, paste screenshots or terminal output.
    validations:
      required: false
