name: 🐛 Bug Report
description: Report a bug in MacJet
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below to help us investigate.

  - type: dropdown
    id: os-version
    attributes:
      label: macOS Version
      options:
        - macOS 15 Sequoia
        - macOS 14 Sonoma
        - macOS 13 Ventura
        - macOS 12 Monterey
        - Other
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: Chip
      options:
        - Apple M4 / M4 Pro / M4 Max / M4 Ultra
        - Apple M3 / M3 Pro / M3 Max / M3 Ultra
        - Apple M2 / M2 Pro / M2 Max / M2 Ultra
        - Apple M1 / M1 Pro / M1 Max / M1 Ultra
        - Intel
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: MacJet / Build Version
      description: "Did you use a GitHub Release binary or `cargo install`?"
      placeholder: "v2.0.1 (Binary) or Cargo 1.75"
    validations:
      required: true

  - type: dropdown
    id: run-mode
    attributes:
      label: How are you running MacJet?
      options:
        - sudo macjet (full mode)
        - macjet (basic mode)
        - cargo run --release
        - MCP server (--mcp)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I press '5' to switch to the Reclaim view..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      value: |
        1. Launch MacJet with `sudo macjet`
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots / Terminal Output
      description: If applicable, paste screenshots or terminal output.
    validations:
      required: false
